name: Feature Request
description: Suggest a new attack vector, language pattern, or integration
labels: [enhancement]
body:
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would you like to see added or changed?
    validations:
      required: true
  - type: textarea
    id: justification
    attributes:
      label: Justification
      description: Why is this useful? Link to relevant research, OWASP references, or real-world examples.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New attack vector
        - New language patterns
        - Better regex accuracy
        - Integration / example
        - CLI feature
        - Documentation
        - Other
