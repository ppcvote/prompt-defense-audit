name: Bug Report
description: Report a false positive, false negative, or unexpected behavior
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: prompt
    attributes:
      label: System prompt (or relevant excerpt)
      description: The prompt text that triggered the issue. Redact sensitive parts.
      render: text
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Actual output
      description: Paste the audit result (JSON preferred).
      render: json
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: "1.2.1"
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "22.x"
